name: release

on:
  push:
    branches:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          staging="gitcredit-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/gitcredit" "$staging/"
          tar czf "${staging}.tar.gz" -C "$staging" gitcredit

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "gitcredit-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/gitcredit.exe" "$staging/"
          Compress-Archive -Path "$staging/gitcredit.exe" -DestinationPath "$staging.zip"

      - name: Stage release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-asset
          staged=0
          for f in gitcredit-${{ matrix.target }}.tar.gz gitcredit-${{ matrix.target }}.zip; do
            if [ -f "$f" ]; then
              mv "$f" release-asset/
              staged=1
            fi
          done
          if [ "$staged" -eq 0 ]; then
            echo "No release artifacts found in $(pwd):"
            ls -la
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: gitcredit-${{ matrix.target }}
          path: release-asset/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) | while read -r file; do
            sha256sum "$file" | awk -v name="$(basename "$file")" '{print $1 "  " name}'
          done > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            SHA256SUMS
          generate_release_notes: true
